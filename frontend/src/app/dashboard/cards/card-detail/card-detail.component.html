<div class="card-component">
  <div class="card-front">
    <header>
      <p class="cardType">{{ cardType }}</p>
      <p class="balance">$ {{ balance }}</p>
    </header>
    <div class="card-number">{{ cardNumber }}</div>
    <div class="card-details">
      <div class="card-holder">
        <h6>Card Holder</h6>
        <h5>{{ cardHolder }}</h5>
      </div>
      <div class="card-expiry">
        <h6>Expires</h6>
        <h5>{{ exipreDate }}</h5>
      </div>
    </div>
  </div>
</div>
